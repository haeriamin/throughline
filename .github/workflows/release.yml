# Builds the dashboard extension and attaches the .vsix to a GitHub Release.
# The .vsix is gitignored — prebuilts are distributed here, never committed to the tree.
#
# Release flow:
#   1. bump "version" in tools/dashboard/package.json, commit it
#   2. git tag dashboard-v<version>   (e.g. dashboard-v0.1.0)
#   3. git push origin dashboard-v<version>
# This workflow then builds the VSIX on Node 20 and publishes it to a Release.
name: Release Dashboard

on:
  push:
    tags:
      - "dashboard-v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish dashboard VSIX
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/dashboard/package-lock.json

      - run: npm ci
      - run: npm run compile

      - name: Package VSIX
        run: |
          V=$(node -p "require('./package.json').version")
          npx --yes @vscode/vsce package --no-dependencies --allow-missing-repository -o "throughline-dashboard-$V.vsix"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" throughline-dashboard-*.vsix \
            --title "Throughline Dashboard ${GITHUB_REF_NAME#dashboard-v}" \
            --notes "Prebuilt VS Code extension. Install in VS Code: Extensions view -> the ... menu -> Install from VSIX..."
