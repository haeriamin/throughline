name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard:
    name: Dashboard extension compiles
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/dashboard/package-lock.json
      - run: npm ci
      - run: npm run compile

  adapters:
    name: Generator parity (ps1 vs bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean generated output
        run: |
          rm -rf .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json

      - name: Generate with PowerShell
        run: pwsh -NoProfile -File tools/convert.ps1 -Tool all

      - name: Capture PowerShell output checksums
        run: |
          find .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json \
            .github/copilot-instructions.md .github/pull_request_template.md \
            -type f 2>/dev/null | sort | xargs -r sha256sum > /tmp/checksums-ps1.txt

      - name: Clean generated output before bash pass
        run: |
          rm -rf .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json

      - name: Regenerate with bash
        run: bash tools/convert.sh --tool all

      - name: Verify bash parity
        run: |
          find .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json \
            .github/copilot-instructions.md .github/pull_request_template.md \
            -type f 2>/dev/null | sort | xargs -r sha256sum > /tmp/checksums-sh.txt
          diff /tmp/checksums-ps1.txt /tmp/checksums-sh.txt

  integrity:
    name: Framework integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate adapters (required — output is gitignored)
        run: pwsh -NoProfile -File tools/convert.ps1 -Tool all

      - name: Root adapter files generate non-empty (AGENTS.md, CLAUDE.md)
        run: |
          for f in AGENTS.md CLAUDE.md; do
            [ -s "$f" ] || { echo "MISSING or EMPTY: $f — should be generated from global-rules.md via the rules emitter"; exit 1; }
            grep -q "Throughline" "$f" || { echo "UNEXPECTED CONTENT: $f"; exit 1; }
          done
          echo "AGENTS.md and CLAUDE.md generated OK"

      - name: Skill parity (.github/skills must equal .claude/skills)
        run: diff -r .github/skills .claude/skills

      - name: Hook smoke tests (bash variants)
        run: |
          chmod +x .claude/hooks/*.sh .github/hooks/scripts/*.sh
          echo '{"tool_name":"Write","tool_input":{"file_path":"standards/x.md"}}' \
            | .claude/hooks/validate-immutable-paths.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_name":"Write","tool_input":{"file_path":"wiki/concepts/x.md"}}' \
            | .claude/hooks/validate-immutable-paths.sh
          echo '{"tool_input":{"path":"exemplars/x.ts"}}' \
            | .github/hooks/scripts/validate-immutable-paths.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"file_path":"README.md"}}' \
            | .github/hooks/scripts/check-code-quality.sh

      - name: Bash-safety hook smoke tests
        run: |
          chmod +x .claude/hooks/validate-bash-safety.sh .github/hooks/scripts/validate-bash-safety.sh
          echo '{"tool_input":{"command":"echo x > standards/y.md"}}' \
            | .claude/hooks/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"command":"cp a exemplars/b"}}' \
            | .github/hooks/scripts/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"command":"git push origin main"}}' \
            | .claude/hooks/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"command":"npm test"}}' \
            | .claude/hooks/validate-bash-safety.sh
          echo '{"tool_input":{"command":"cat standards/api-design.md"}}' \
            | .claude/hooks/validate-bash-safety.sh

      - name: Hook wiring resolves to real scripts
        run: |
          python3 tools/setup-hooks.py
          python3 - <<'PY'
          import json, pathlib, re, sys
          missing = []
          def check(path, keys):
              data = json.load(open(path))
              hooks = data.get("hooks", data)
              for phase in hooks.values():
                  for grp in phase:
                      for entry in grp.get("hooks", [grp]):
                          for key in keys:
                              m = re.search(r'((?:\.github/hooks/scripts|\.claude/hooks)/[\w.-]+)', entry.get(key, ""))
                              if m and not pathlib.Path(m.group(1)).exists():
                                  missing.append(f"{path}: {m.group(1)}")
          check(".github/hooks/hooks.json", ("command", "windows"))
          check(".claude/settings.local.json", ("command",))
          check(".codex/hooks.json", ("command",))
          if pathlib.Path(".cursor/hooks.json").exists():
              check(".cursor/hooks.json", ("command",))
          if missing:
              print("MISSING HOOK SCRIPTS:", *sorted(set(missing)), sep="\n  "); sys.exit(1)
          print("all referenced hook scripts present")
          PY

      - name: Core scripts smoke test (bash variants)
        run: |
          chmod +x .throughline/scripts/bash/*.sh
          # Register a throwaway target whose provenance home is a temp dir (specs are target-side now).
          SMOKE_DIR="$(mktemp -d)"
          cp .throughline/templates/target-template.yml targets/smoke.yml
          sed -i "s|^id:.*|id: smoke|" targets/smoke.yml
          sed -i "s|^path:.*|path: \"$SMOKE_DIR\"|" targets/smoke.yml
          .throughline/scripts/bash/create-new-feature.sh smoke smoke-test | grep -q '"FEATURE_NUM":"001"'
          test -f "$SMOKE_DIR/.throughline/specs/001-smoke-test/spec.md"
          .throughline/scripts/bash/check-prerequisites.sh plan && exit 1 || true
          rm -rf "$SMOKE_DIR" targets/smoke.yml .throughline/feature.json

      - name: JSON artifacts parse
        run: |
          for f in .github/hooks/hooks.json .claude/settings.json \
                   .throughline/workflows/workflow-registry.json .throughline/init-options.json \
                   .throughline/adapters/generated/cursor/hooks.template.json \
                   .throughline/adapters/generated/antigravity/hooks.template.json \
                   opencode.json .qwen/settings.json \
                   tools/dashboard/package.json tools/dashboard/tsconfig.json; do
            [ -f "$f" ] || { echo "MISSING (run convert first): $f"; exit 1; }
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; exit 1; }
          done
