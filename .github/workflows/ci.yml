name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dashboard:
    name: Dashboard extension builds and packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/dashboard/package-lock.json
      - run: npm ci
      - run: npm run compile
      # Exercise the exact packaging the release workflow uses, so a broken manifest,
      # missing icon, or stray file fails here on every PR — never at tag-release time.
      - name: Package VSIX (release dry-run)
        run: npx --yes @vscode/vsce package --no-dependencies --allow-missing-repository -o "$RUNNER_TEMP/dashboard-ci.vsix"

  adapters:
    name: Generator parity (ps1 vs bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean generated output
        run: |
          rm -rf .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json

      - name: Generate with PowerShell
        run: pwsh -NoProfile -File tools/convert.ps1 -Tool all

      - name: Capture PowerShell output checksums
        run: |
          find .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json \
            .github/copilot-instructions.md .github/pull_request_template.md \
            -type f 2>/dev/null | sort | xargs -r sha256sum > /tmp/checksums-ps1.txt

      - name: Clean generated output before bash pass
        run: |
          rm -rf .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json

      - name: Regenerate with bash
        run: bash tools/convert.sh --tool all

      - name: Verify bash parity
        run: |
          find .claude .codex .cursor .agent .agents .opencode .qwen .kimi \
            .github/agents .github/instructions .github/skills .github/prompts .github/hooks \
            .throughline/adapters/generated .throughline/integrations \
            AGENTS.md CLAUDE.md GEMINI.md QWEN.md opencode.json \
            .github/copilot-instructions.md .github/pull_request_template.md \
            -type f 2>/dev/null | sort | xargs -r sha256sum > /tmp/checksums-sh.txt
          diff /tmp/checksums-ps1.txt /tmp/checksums-sh.txt

  integrity:
    name: Framework integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate adapters (required — output is gitignored)
        run: pwsh -NoProfile -File tools/convert.ps1 -Tool all

      - name: Root adapter files generate non-empty (AGENTS.md, CLAUDE.md)
        run: |
          for f in AGENTS.md CLAUDE.md; do
            [ -s "$f" ] || { echo "MISSING or EMPTY: $f — should be generated from global-rules.md via the rules emitter"; exit 1; }
            grep -q "Throughline" "$f" || { echo "UNEXPECTED CONTENT: $f"; exit 1; }
          done
          echo "AGENTS.md and CLAUDE.md generated OK"

      - name: Skill parity (.github/skills must equal .claude/skills)
        run: diff -r .github/skills .claude/skills

      - name: Agent files begin with YAML frontmatter
        run: |
          # Regression guard: the generator must NOT prepend its "generated by" comment ahead of the
          # `---` frontmatter, or the runtime stops parsing each agent's name/description/tools.
          bad=0
          for f in .github/agents/*.md .claude/agents/*.md; do
            [ -f "$f" ] || continue
            if [ "$(head -n1 "$f")" != "---" ]; then
              echo "NOT frontmatter-first: $f (line 1 = '$(head -n1 "$f")')"; bad=1
            fi
          done
          [ "$bad" -eq 0 ] || { echo "agent files must start with '---' so the runtime parses their frontmatter"; exit 1; }
          echo "all agent files start with frontmatter"

      - name: Hook smoke tests (bash variants)
        run: |
          chmod +x .claude/hooks/*.sh .github/hooks/scripts/*.sh
          echo '{"tool_name":"Write","tool_input":{"file_path":"standards/x.md"}}' \
            | .claude/hooks/validate-immutable-paths.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_name":"Write","tool_input":{"file_path":"wiki/concepts/x.md"}}' \
            | .claude/hooks/validate-immutable-paths.sh
          echo '{"tool_input":{"path":"exemplars/x.ts"}}' \
            | .github/hooks/scripts/validate-immutable-paths.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"file_path":"README.md"}}' \
            | .github/hooks/scripts/check-code-quality.sh

      - name: Bash-safety hook smoke tests
        run: |
          chmod +x .claude/hooks/validate-bash-safety.sh .github/hooks/scripts/validate-bash-safety.sh
          echo '{"tool_input":{"command":"echo x > standards/y.md"}}' \
            | .claude/hooks/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"command":"cp a exemplars/b"}}' \
            | .github/hooks/scripts/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"command":"git push origin main"}}' \
            | .claude/hooks/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          # Evasions that put options before the subcommand must still be blocked (regression).
          echo '{"tool_input":{"command":"git -C /tmp/x push"}}' \
            | .claude/hooks/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          echo '{"tool_input":{"command":"git -c protocol.version=2 push"}}' \
            | .claude/hooks/validate-bash-safety.sh && exit 1 || [ $? -eq 2 ]
          # ...but a commit whose message merely mentions "push" must NOT be blocked (no over-block).
          echo '{"tool_input":{"command":"git commit -m \"do not push yet\""}}' \
            | .claude/hooks/validate-bash-safety.sh
          echo '{"tool_input":{"command":"npm test"}}' \
            | .claude/hooks/validate-bash-safety.sh
          echo '{"tool_input":{"command":"cat standards/api-design.md"}}' \
            | .claude/hooks/validate-bash-safety.sh

      - name: Hook smoke tests (PowerShell variants — parity with bash)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          # PS 7.4+ would otherwise turn a hook's exit 2 into a thrown error before we can read it.
          $PSNativeCommandUseErrorActionPreference = $false
          function Assert-Hook($json, $script, $expectBlock) {
            $json | pwsh -NoProfile -File $script | Out-Null
            $code = $LASTEXITCODE
            if ($expectBlock -and $code -ne 2) { throw "expected BLOCK (exit 2) from $script, got $code" }
            if (-not $expectBlock -and $code -ne 0) { throw "expected ALLOW (exit 0) from $script, got $code" }
          }
          Assert-Hook '{"tool_name":"Write","tool_input":{"file_path":"standards/x.md"}}' ".claude/hooks/validate-immutable-paths.ps1" $true
          Assert-Hook '{"tool_name":"Write","tool_input":{"file_path":"wiki/concepts/x.md"}}' ".claude/hooks/validate-immutable-paths.ps1" $false
          Assert-Hook '{"tool_input":{"command":"echo x > standards/y.md"}}' ".claude/hooks/validate-bash-safety.ps1" $true
          Assert-Hook '{"tool_input":{"command":"git -C /tmp/x push"}}' ".claude/hooks/validate-bash-safety.ps1" $true
          Assert-Hook '{"tool_input":{"command":"git -c protocol.version=2 push"}}' ".claude/hooks/validate-bash-safety.ps1" $true
          Assert-Hook '{"tool_input":{"command":"git push origin main"}}' ".claude/hooks/validate-bash-safety.ps1" $true
          Assert-Hook '{"tool_input":{"command":"git commit -m \"do not push yet\""}}' ".claude/hooks/validate-bash-safety.ps1" $false
          Assert-Hook '{"tool_input":{"command":"npm test"}}' ".claude/hooks/validate-bash-safety.ps1" $false
          Write-Host "PowerShell hook parity OK"
          exit 0

      - name: Hook wiring resolves to real scripts
        run: |
          python3 tools/setup-hooks.py
          python3 - <<'PY'
          import json, pathlib, re, sys
          missing = []
          def check(path, keys):
              data = json.load(open(path))
              hooks = data.get("hooks", data)
              for phase in hooks.values():
                  for grp in phase:
                      for entry in grp.get("hooks", [grp]):
                          for key in keys:
                              m = re.search(r'((?:\.github/hooks/scripts|\.claude/hooks)/[\w.-]+)', entry.get(key, ""))
                              if m and not pathlib.Path(m.group(1)).exists():
                                  missing.append(f"{path}: {m.group(1)}")
          check(".github/hooks/hooks.json", ("command", "windows"))
          check(".claude/settings.local.json", ("command",))
          check(".codex/hooks.json", ("command",))
          if pathlib.Path(".cursor/hooks.json").exists():
              check(".cursor/hooks.json", ("command",))
          if missing:
              print("MISSING HOOK SCRIPTS:", *sorted(set(missing)), sep="\n  "); sys.exit(1)
          print("all referenced hook scripts present")
          PY

      - name: Core scripts smoke test (bash variants)
        run: |
          chmod +x .throughline/scripts/bash/*.sh
          # Register a throwaway target whose provenance home is a temp dir (specs are target-side now).
          SMOKE_DIR="$(mktemp -d)"
          cp .throughline/templates/target-template.yml targets/smoke.yml
          sed -i "s|^id:.*|id: smoke|" targets/smoke.yml
          sed -i "s|^path:.*|path: \"$SMOKE_DIR\"|" targets/smoke.yml
          .throughline/scripts/bash/create-new-feature.sh smoke smoke-test | grep -q '"FEATURE_NUM":"001"'
          test -f "$SMOKE_DIR/.throughline/specs/001-smoke-test/spec.md"
          # A fresh template spec has spec.md and no [NEEDS CLARIFICATION markers → plan precheck passes.
          .throughline/scripts/bash/check-prerequisites.sh plan | grep -q '"OK":true'
          # implement needs plan.md + tasks.md (absent on a fresh slice) → precheck fails.
          .throughline/scripts/bash/check-prerequisites.sh implement && exit 1 || true
          # An unresolved [NEEDS CLARIFICATION marker must block plan (clarification gate works).
          printf '\n[NEEDS CLARIFICATION: smoke gate]\n' >> "$SMOKE_DIR/.throughline/specs/001-smoke-test/spec.md"
          .throughline/scripts/bash/check-prerequisites.sh plan && exit 1 || true
          # A CRLF (Windows-authored) target file must not leak a trailing \r into the resolved path.
          printf 'id: smokecrlf\r\npath: "%s"\r\n' "$SMOKE_DIR" > targets/smokecrlf.yml
          ROOT_OUT="$( . .throughline/scripts/bash/common.sh; get_target_root smokecrlf )"
          case "$ROOT_OUT" in *$'\r'*) echo "carriage return leaked into resolved target path"; exit 1 ;; esac
          rm -rf "$SMOKE_DIR" targets/smoke.yml targets/smokecrlf.yml .throughline/feature.json

      - name: JSON artifacts parse
        run: |
          for f in .github/hooks/hooks.json .claude/settings.json \
                   .throughline/workflows/workflow-registry.json .throughline/init-options.json \
                   .throughline/adapters/generated/cursor/hooks.template.json \
                   .throughline/adapters/generated/antigravity/hooks.template.json \
                   opencode.json .qwen/settings.json \
                   tools/dashboard/package.json tools/dashboard/tsconfig.json; do
            [ -f "$f" ] || { echo "MISSING (run convert first): $f"; exit 1; }
            python3 -m json.tool "$f" > /dev/null || { echo "INVALID JSON: $f"; exit 1; }
          done

  core-scripts-windows:
    name: Core scripts smoke test (PowerShell, Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lifecycle scripts run under Windows PowerShell
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tmp = (New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP "tl-smoke")).FullName
          $specDir = Join-Path $tmp ".throughline/specs/001-smoke-test"
          # Register a throwaway target whose provenance home is the temp dir (forward slashes for YAML).
          $tpl = Get-Content .throughline/templates/target-template.yml
          $tpl = $tpl -replace '^id:.*', 'id: smoke' -replace '^path:.*', "path: `"$($tmp -replace '\\','/')`""
          $tpl | Set-Content targets/smoke.yml
          $out = .throughline/scripts/powershell/create-new-feature.ps1 -Target smoke -ShortName smoke-test
          if ($out -notmatch '"FEATURE_NUM":\s*"001"') { throw "create-new-feature did not return 001: $out" }
          if (-not (Test-Path (Join-Path $specDir "spec.md"))) { throw "spec.md was not created" }
          # Fresh spec → plan precheck passes (no [NEEDS CLARIFICATION markers). check-prerequisites
          # exits 0 by falling off the end, which does NOT set $LASTEXITCODE — so assert on the JSON.
          $plan = (.throughline/scripts/powershell/check-prerequisites.ps1 -Phase plan) -join "`n"
          if ($plan -notmatch '"OK":\s*true') { throw "plan precheck should pass on a fresh spec: $plan" }
          # implement → missing plan.md + tasks.md → precheck reports OK:false and names them.
          $impl = (.throughline/scripts/powershell/check-prerequisites.ps1 -Phase implement) -join "`n"
          if ($impl -notmatch '"OK":\s*false' -or $impl -notmatch 'plan\.md' -or $impl -notmatch 'tasks\.md') { throw "implement precheck should fail listing plan.md/tasks.md: $impl" }
          # An injected [NEEDS CLARIFICATION marker must block plan.
          Add-Content (Join-Path $specDir "spec.md") "`n[NEEDS CLARIFICATION: smoke gate]"
          $marked = (.throughline/scripts/powershell/check-prerequisites.ps1 -Phase plan) -join "`n"
          if ($marked -notmatch '"OK":\s*false') { throw "plan precheck should fail with an unresolved marker: $marked" }
          Remove-Item -Recurse -Force $tmp, targets/smoke.yml, .throughline/feature.json
          Write-Host "PowerShell lifecycle scripts OK"
          exit 0
